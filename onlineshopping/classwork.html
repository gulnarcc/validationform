<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .search{
        width:80%;
        height:80vh;
        background-color:red ;
        position:relative;
        top:20px;
        left:10%;
        visibility: hidden;
     }  
     .close{
        position:absolute;
        right:20px;
        top:20px;
        font-size:30px;
        cursor: pointer;
     } 
    </style>
</head>
<body>
    <button type="button" id="Myalert">Alert</button>
     <button type="button" id="Mysearch">Search</button>
    <div class="search" id="search">
<div class="close" id="close">x</div>

    </div>
    <script>
let Mysearch=document.querySelector("#Mysearch")
let search=document.querySelector("#search")
Mysearch.addEventListener("click", function(){
search.style.visibility="visible"
})


    </script>
</body>
</html>
